spring:
  application:
    name: ai-summary-podcast
  jackson:
    json:
      read:
        allow-backslash-escaping-any-character: true
  lifecycle:
    timeout-per-shutdown-phase: 10s
  autoconfigure:
    exclude:
      - org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration
      - org.springframework.ai.model.chat.client.autoconfigure.ChatClientAutoConfiguration
  datasource:
    url: jdbc:sqlite:./data/ai-summary-podcast.db?busy_timeout=5000&journal_mode=WAL
    driver-class-name: org.sqlite.JDBC
    hikari:
      connection-init-sql: "PRAGMA foreign_keys = ON"
  flyway:
    baseline-on-migrate: true
    baseline-version: 0

app:
  encryption:
    master-key: ${APP_ENCRYPTION_MASTER_KEY}
  models:
    openrouter:
      "[openai/gpt-5.4-nano]":
        type: llm
        input-cost-per-mtok: 0.20
        output-cost-per-mtok: 1.25
      "[anthropic/claude-sonnet-4.6]":
        type: llm
        input-cost-per-mtok: 3.00
        output-cost-per-mtok: 15.00
      "[anthropic/claude-opus-4.6]":
        type: llm
        input-cost-per-mtok: 5.00
        output-cost-per-mtok: 25.00
    openai:
      "[tts-1-hd]":
        type: tts
        cost-per-million-chars: 15.00
    elevenlabs:
      "[default]":
        type: tts
        cost-per-million-chars: 30.00
    inworld:
      "[inworld-tts-1.5-max]":
        type: tts
        cost-per-million-chars: 10.00
      "[inworld-tts-1.5-mini]":
        type: tts
        cost-per-million-chars: 5.00
  llm:
    defaults:
      filter:
        provider: openrouter
        model: openai/gpt-5.4-nano
      compose:
        provider: openrouter
        model: anthropic/claude-sonnet-4.6
    max-cost-cents: 200
    scoring:
      concurrency: 10
      max-retries: 3
  briefing:
    target-words: 1500
  episode:
    recap-lookback-episodes: 7
  episodes:
    directory: ./data
    retention-days: 365
  source:
    max-article-age-days: 90
  feed:
    base-url: http://localhost:8085
    title: AI Summary Podcast
    description: AI-generated audio briefings from your favourite content sources
    owner-name: Sourcelabs
    owner-email: podcast@sourcelabs.nl
    author: Sourcelabs
    itunes-category: Technology
    explicit: false
  soundcloud:
    client-id: ${APP_SOUNDCLOUD_CLIENT_ID:}
    client-secret: ${APP_SOUNDCLOUD_CLIENT_SECRET:}

logging:
  file:
    name: app.log
  logback:
    rollingpolicy:
      file-name-pattern: app.%d{yyyy-MM-dd}.%i.log.gz
      max-history: 7

server:
  port: 8085
  shutdown: graceful